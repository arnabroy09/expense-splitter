<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Splitter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="money-pattern"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <header class="header">
      <div class="topbar">
        <div class="brand-wrap">
          <div class="brand-badge">₹</div>
          <div>
            <h1>Expense Splitter</h1>
            <p>Split bills easily among friends, trips, rent, food, and more.</p>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="themeToggleBtn" class="secondary-btn">Switch to Light</button>
          <button id="printBtn" class="secondary-btn">Print</button>
        </div>
      </div>
    </header>

    <main>
      <section class="card form-section no-print">
        <h2>Expense Details</h2>

        <div class="form-group">
          <label for="title">Event / Expense Title</label>
          <input type="text" id="title" placeholder="e.g. Goa Trip / Restaurant Bill" />
        </div>

        <div class="form-group">
          <label for="peopleCount">Total Number of People</label>
          <input type="number" id="peopleCount" min="1" placeholder="e.g. 4" />
        </div>

        <div class="split-mode-wrap">
          <label>Split Mode</label>
          <div class="split-mode-toggle">
            <button id="equalSplitBtn" class="mode-btn active-mode" type="button">Equal Split</button>
            <button id="customSplitBtn" class="mode-btn" type="button">Custom Split</button>
          </div>
        </div>

        <div class="button-group">
          <button id="generateBtn">Generate Person Inputs</button>
          <button id="clearBtn" class="secondary-btn">Clear All</button>
          <button id="downloadBtn" class="secondary-btn">Download Summary</button>
        </div>

        <div id="warningBox" class="warning-box hidden"></div>

        <div id="peopleInputs" class="people-grid"></div>

        <div class="calculate-wrap">
          <button id="calculateBtn" class="calculate-btn">Calculate Split</button>
        </div>
      </section>

      <section class="card result-section" id="result">
        <div class="result-header no-print">
          <h2>Result</h2>
          <button id="copyBtn" class="secondary-btn">Copy Result</button>
        </div>
        <p>Calculation result will appear here.</p>
      </section>

      <section class="card history-section no-print">
        <div class="history-header">
          <h2>Recent History</h2>
          <button id="clearHistoryBtn" class="secondary-btn">Clear History</button>
        </div>
        <div id="historyList">
          <p>No history yet.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
